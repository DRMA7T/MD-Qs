  <style>
    /* GLOBAL RESET & DESIGN SYSTEM */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(145deg, #f7f9fc 0%, #eef2f7 100%);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem 1.5rem;
      color: #1e293b;
    }

    /* profile card – soft, spacious */
    .bio-card {
      max-width: 750px;
      width: 100%;
      background: rgba(255,255,255,0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 48px 48px 48px 48px;
      box-shadow: 0 20px 35px -10px rgba(0,10,30,0.15);
      padding: 2.8rem 2rem;
      border: 1px solid rgba(255,255,255,0.5);
      transition: all 0.2s ease;
    }

    /* avatar + welcome */
    .profile-intro {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 2.5rem;
    }

    /* Instagram profile picture – always syncs */
    .avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      border: 3px solid white;
      box-shadow: 0 10px 18px -8px rgba(0,0,0,0.16);
      margin-bottom: 1rem;
      background: #f0f2f5;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .greet {
      font-size: 1.8rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      background: linear-gradient(145deg, #1f2a48, #0f172a);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 0.2rem;
    }

    .handle {
      font-size: 1.1rem;
      color: #4b587c;
      font-weight: 400;
      background: rgba(255,255,255,0.6);
      padding: 0.25rem 1.2rem;
      border-radius: 40px;
      backdrop-filter: blur(4px);
    }

    /* ===== SOCIAL ICON GRID ===== */
    .social-grid {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 1.2rem;
      margin-top: 0.8rem;
    }

    /* 
      🎯 UNIFORM ICON SIZES – ONE VARIABLE TO RULE THEM ALL 
      👇 CHANGE THIS ONE VALUE — ALL ICONS SCALE PERFECTLY
    */
    :root {
      --icon-size: 3.2rem;    /* ⚡ MASTER CONTROL – edit only this */
      --icon-roundness: 18px;  
      --icon-bg: #ffffff;
      --icon-color: #1e2b4a;
    }

    /* every social link – exact same width/height */
    .social-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: var(--icon-size);
      height: var(--icon-size);
      background: var(--icon-bg);
      border-radius: var(--icon-roundness);
      color: var(--icon-color);
      box-shadow: 0 8px 18px -6px rgba(0,0,0,0.1);
      transition: all 0.2s cubic-bezier(0.2, 0, 0, 1);
      border: 1px solid rgba(255,255,255,0.6);
      text-decoration: none;
    }

    /* icon inside – size relative to container */
    .social-link i {
      font-size: calc(var(--icon-size) * 0.6);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* hover effect – smooth lift + brand colors */
    .social-link:hover {
      background: #fefeff;
      transform: scale(1.08) translateY(-3px);
      box-shadow: 0 16px 22px -10px rgba(0,32,64,0.2);
      border-color: #cbd5e1;
    }

    /* brand colors on hover – all platforms */
    .social-link:hover .fa-instagram { color: #d62976; }
    .social-link:hover .fa-twitter { color: #000000; }   
    .social-link:hover .fa-github { color: #171515; }
    .social-link:hover .fa-linkedin-in { color: #0A66C2; }
    .social-link:hover .fa-youtube { color: #FF0000; }
    .social-link:hover .fa-tiktok { color: #000000; }
    .social-link:hover .fa-snapchat { color: #FFFC00; }
    .social-link:hover .fa-facebook-f { color: #1877F2; }
    .social-link:hover .fa-twitch { color: #9146FF; }
    .social-link:hover .fa-discord { color: #5865F2; }
    .social-link:hover .fa-telegram-plane { color: #26A5E4; } /* ✅ fixed: Telegram now turns blue */
    .social-link:hover .fa-whatsapp { color: #25D366; }
    .social-link:hover .fa-playstation { color: #003791; }
    .social-link:hover .fa-xbox { color: #107C10; }
    .social-link:hover .fa-globe { color: #4285F4; }        /* website - google blue */
    .social-link:hover .fa-envelope { color: #EA4335; }     /* email - gmail red */
    .social-link:hover .fa-phone-alt { color: #25D366; }    /* telephone - whatsapp green */
    .social-link:hover .fa-reddit-alien { color: #FF4500; } /* reddit orange-red */
    .social-link:hover .fa-steam { color: #171a21; }        /* steam dark */
    .social-link:hover .fa-epic-games { color: #313131; }   /* epic games dark */
    .social-link:hover .fa-battle-net { color: #148eff; }   /* blizzard blue */
    .social-link:hover .fa-paypal { color: #003087; }       /* paypal dark blue */

    /* responsive adjustment */
    @media (max-width: 450px) {
      .bio-card { padding: 1.8rem 1rem; }
      .social-grid { gap: 0.9rem; }
      :root { --icon-size: 2.8rem; }
    }

    .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; }
  </style>
