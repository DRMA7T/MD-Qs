<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
  <title>Real Madrid C.F. | Official Social Hub</title>
  <!-- Font Awesome 6 (free) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
  <!-- Google Font Inter -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(145deg, #f7f9fc 0%, #eef2f7 100%);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem 1.5rem;
      color: #1e293b;
    }

    .bio-card {
      max-width: 750px;
      width: 100%;
      background: rgba(255,255,255,0.75);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 48px;
      box-shadow: 0 20px 35px -10px rgba(0,10,30,0.15);
      padding: 2.8rem 2rem;
      border: 1px solid rgba(255,255,255,0.5);
      transition: all 0.2s ease;
    }

    .profile-intro {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 2.5rem;
    }

    .avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      border: 3px solid white;
      box-shadow: 0 10px 18px -8px rgba(0,0,0,0.16);
      margin-bottom: 1rem;
      background: #f0f2f5;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .greet {
      font-size: 1.8rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      background: linear-gradient(145deg, #1f2a48, #0f172a);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 0.2rem;
    }

    .handle {
      font-size: 1.1rem;
      color: #4b587c;
      font-weight: 400;
      background: rgba(255,255,255,0.6);
      padding: 0.25rem 1.2rem;
      border-radius: 40px;
      backdrop-filter: blur(4px);
    }

    .madrid-note {
      margin-top: 8px;
      font-size: 0.95rem;
      background: rgba(0,45,114,0.1);
      color: #002d72;
      padding: 0.2rem 1.4rem;
      border-radius: 30px;
      font-weight: 500;
      border: 1px solid rgba(255,215,0,0.3);
    }

    :root {
      --icon-size: 3.2rem;    
      --icon-roundness: 18px;  
      --icon-bg: #ffffff;
      --icon-color: #1e2b4a;
    }

    .social-grid {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 1.2rem;
      margin-top: 0.8rem;
    }

    .social-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: var(--icon-size);
      height: var(--icon-size);
      background: var(--icon-bg);
      border-radius: var(--icon-roundness);
      color: var(--icon-color);
      box-shadow: 0 8px 18px -6px rgba(0,0,0,0.1);
      transition: all 0.2s cubic-bezier(0.2, 0, 0, 1);
      border: 1px solid rgba(255,255,255,0.6);
      text-decoration: none;
    }

    .social-link i {
      font-size: calc(var(--icon-size) * 0.6);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .social-link:hover {
      background: #fefeff;
      transform: scale(1.08) translateY(-3px);
      box-shadow: 0 16px 22px -10px rgba(0,32,64,0.2);
      border-color: #cbd5e1;
    }

    .social-link:hover .fa-instagram { color: #d62976; }
    .social-link:hover .fa-x-twitter { color: #000000; }   
    .social-link:hover .fa-tiktok { color: #000000; }
    .social-link:hover .fa-snapchat { color: #FFFC00; }
    .social-link:hover .fa-facebook-f { color: #1877F2; }
    .social-link:hover .fa-youtube { color: #FF0000; }
    .social-link:hover .fa-linkedin-in { color: #0A66C2; }
    .social-link:hover .fa-twitch { color: #9146FF; }
    .social-link:hover .fa-discord { color: #5865F2; }
    .social-link:hover .fa-telegram-plane { color: #26A5E4; }
    .social-link:hover .fa-whatsapp { color: #25D366; }
    .social-link:hover .fa-globe { color: #4285F4; }

    @media (max-width: 450px) {
      .bio-card { padding: 1.8rem 1rem; }
      .social-grid { gap: 0.9rem; }
      :root { --icon-size: 2.8rem; }
    }

    .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; }
  </style>
</head>
<body>
  <div class="bio-card">
    <div class="profile-intro">
      <div class="avatar">
        <img src="https://unavatar.io/x/realmadrid" alt="Real Madrid crest">
      </div>
      <div class="greet">Real Madrid C.F.</div>
      <div class="handle">🔵 @realmadrid • #HalaMadrid</div>
      <div class="madrid-note">🇪🇸 Official channels</div>
    </div>

    <!-- CLEAN SOCIAL GRID - ONE SET OF ICONS ONLY -->
    <div class="social-grid">
      <!-- Instagram -->
      <a href="https://instagram.com/realmadrid" class="social-link" target="_blank" rel="noopener">
        <i class="fab fa-instagram"></i><span class="sr-only">Instagram</span>
      </a>
      
      <!-- X (Twitter) -->
      <a href="https://x.com/realmadrid" class="social-link" target="_blank" rel="noopener">
        <i class="fab fa-x-twitter"></i><span class="sr-only">X</span>
      </a>
      
      <!-- Facebook -->
      <a href="https://facebook.com/realmadrid" class="social-link" target="_blank" rel="noopener">
        <i class="fab fa-facebook-f"></i><span class="sr-only">Facebook</span>
      </a>
      
      <!-- YouTube -->
      <a href="https://youtube.com/realmadrid" class="social-link" target="_blank" rel="noopener">
        <i class="fab fa-youtube"></i><span class="sr-only">YouTube</span>
      </a>
      
      <!-- TikTok -->
      <a href="https://tiktok.com/@realmadrid" class="social-link" target="_blank" rel="noopener">
        <i class="fab fa-tiktok"></i><span class="sr-only">TikTok</span>
      </a>
      
      <!-- Snapchat -->
      <a href="https://snapchat.com/add/realmadrid" class="social-link" target="_blank" rel="noopener">
        <i class="fab fa-snapchat"></i><span class="sr-only">Snapchat</span>
      </a>
      
      <!-- LinkedIn -->
      <a href="https://linkedin.com/company/real-madrid-c-f-" class="social-link" target="_blank" rel="noopener">
        <i class="fab fa-linkedin-in"></i><span class="sr-only">LinkedIn</span>
      </a>
      
      <!-- Twitch -->
      <a href="https://twitch.tv/realmadrid" class="social-link" target="_blank" rel="noopener">
        <i class="fab fa-twitch"></i><span class="sr-only">Twitch</span>
      </a>
      
      <!-- Discord -->
      <a href="https://discord.com/invite/realmadrid" class="social-link" target="_blank" rel="noopener">
        <i class="fab fa-discord"></i><span class="sr-only">Discord</span>
      </a>
      
      <!-- Telegram -->
      <a href="https://t.me/realmadrid" class="social-link" target="_blank" rel="noopener">
        <i class="fab fa-telegram-plane"></i><span class="sr-only">Telegram</span>
      </a>
      
      <!-- WhatsApp Channel -->
      <a href="https://whatsapp.com/channel/0029Va4ADftR9swL66Rc0N3q" class="social-link" target="_blank" rel="noopener">
        <i class="fab fa-whatsapp"></i><span class="sr-only">WhatsApp</span>
      </a>
      
      <!-- Official Website -->
      <a href="https://realmadrid.com" class="social-link" target="_blank" rel="noopener">
        <i class="fas fa-globe"></i><span class="sr-only">Website</span>
      </a>
    </div>

    <!-- Simple credit line (optional) -->
    <div style="text-align: center; margin-top: 2rem; opacity: 0.6; font-size: 0.85rem; color: #4b587c;">
      Real Madrid official social channels
    </div>
  </div>
</body>
</html>
